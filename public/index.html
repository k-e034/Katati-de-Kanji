<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>IDS-IME — 字形で引く漢字入力</title>
<style>
  :root {
    --bg: #0f1115; --fg: #e6e6e6; --muted: #8a8f99; --accent: #7ab7ff;
    --card: #1a1d24; --border: #2a2e37;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans CJK JP", sans-serif;
    padding: 32px; max-width: 960px; margin: 0 auto;
  }
  h1 { font-size: 20px; font-weight: 500; margin: 0 0 8px; letter-spacing: .02em; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  input[type="text"] {
    flex: 1; padding: 14px 16px; font-size: 18px;
    background: var(--card); color: var(--fg); border: 1px solid var(--border);
    border-radius: 8px; outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  .hint { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  .tokens { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; min-height: 22px; }
  .token {
    background: var(--card); border: 1px solid var(--border); padding: 2px 10px;
    border-radius: 999px; font-size: 13px; color: var(--muted);
  }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 8px; margin-top: 8px;
  }
  .cell {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 4px 6px; text-align: center; cursor: pointer; transition: all .1s;
  }
  .cell:hover { border-color: var(--accent); transform: translateY(-1px); }
  .cell.copied { border-color: #4ade80; }
  .glyph {
    font-size: 32px; line-height: 1.1; font-family: "Hiragino Mincho ProN", "Yu Mincho",
      "Noto Serif CJK JP", serif;
  }
  .cp { font-size: 10px; color: var(--muted); margin-top: 4px; font-family: monospace; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 16px; }
  .empty { color: var(--muted); padding: 20px; text-align: center; }
</style>
</head>
<body>
  <h1>IDS-IME — 字形で引く漢字入力</h1>
  <div class="sub">読みが分からない漢字を「見たまま」の言語化で検索。例: きへんにもどる → 棙 / あめくちくちくちりゅう → 龗</div>
  <div class="input-row">
    <input id="q" type="text" placeholder="きへんにもどる" autocomplete="off" autofocus>
  </div>
  <div class="hint">ひらがな（またはカタカナ）で部品の読みを列挙。「へん」「つくり」「かんむり」「に」等は無視されます。</div>
  <div class="tokens" id="tokens"></div>
  <div id="results" class="grid"></div>
  <div class="meta" id="meta"></div>

<script>
const qEl = document.getElementById('q');
const tokensEl = document.getElementById('tokens');
const resultsEl = document.getElementById('results');
const metaEl = document.getElementById('meta');

let timer;
qEl.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(runSearch, 120);
});

async function runSearch() {
  const q = qEl.value.trim();
  if (!q) { tokensEl.innerHTML = ''; resultsEl.innerHTML = ''; metaEl.textContent = ''; return; }
  const res = await fetch('/api/search?q=' + encodeURIComponent(q));
  const data = await res.json();

  tokensEl.innerHTML = (data.tokens ?? []).map(t => `<span class="token">${escape(t)}</span>`).join('');

  const rs = data.results ?? [];
  if (rs.length === 0) {
    resultsEl.innerHTML = '<div class="empty">該当なし</div>';
  } else {
    resultsEl.innerHTML = rs.map(ucs => {
      const cp = ucs.codePointAt(0).toString(16).toUpperCase().padStart(4, '0');
      return `<div class="cell" data-ucs="${escape(ucs)}">
        <div class="glyph">${escape(ucs)}</div>
        <div class="cp">U+${cp}</div>
      </div>`;
    }).join('');
  }

  const tokenSummary = (data.candidates ?? []).map((c, i) =>
    `${data.tokens[i]}(${c.length})`).join(' + ');
  metaEl.textContent = `${rs.length} 件 / ${data.elapsedMs ?? '?'}ms / ${tokenSummary}`;

  for (const el of resultsEl.querySelectorAll('.cell')) {
    el.addEventListener('click', () => {
      const ucs = el.dataset.ucs;
      navigator.clipboard.writeText(ucs).then(() => {
        el.classList.add('copied');
        setTimeout(() => el.classList.remove('copied'), 500);
      });
    });
  }
}

function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
